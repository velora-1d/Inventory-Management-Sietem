version: '3.8'

services:
  # PHP Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - inventory_network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: inventory_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - inventory_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: inventory_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - inventory_network

networks:
  inventory_network:
    driver: bridge
